services:
  bitpos:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # ── Tunnel / domain ────────────────────────────────────────────────────
      # Three modes (the entrypoint picks the right one automatically):
      #
      #  Quick tunnel (default, no config needed):
      #    Leave both blank. cloudflared generates a trycloudflare.com URL at
      #    startup. URL changes every restart - good for testing.
      #
      #  Named tunnel (stable URL, recommended for real use):
      #    1. Create a free Cloudflare account at cloudflare.com
      #    2. Go to Zero Trust -> Networks -> Tunnels -> Create a tunnel
      #    3. Copy the tunnel token and your public hostname, then set both below.
      #    CLOUDFLARE_TUNNEL_TOKEN=eyJ...
      #    DOMAIN=pay.myshop.com
      #
      #  Manual (VPS / Caddy / Nginx):
      #    Set DOMAIN only. cloudflared is skipped entirely.
      #    DOMAIN=pay.myshop.com
      #
      CLOUDFLARE_TUNNEL_TOKEN: "${CLOUDFLARE_TUNNEL_TOKEN:-}"
      DOMAIN: "${DOMAIN:-}"

      # ── Wallet ────────────────────────────────────────────────────────────
      # Optional bootstrap: pre-seed the NWC URL. Users can also paste one in
      # the first-boot wizard, which stores it in the database.
      NWC_URL: "${NWC_URL:-}"

      # ── Security ──────────────────────────────────────────────────────────
      # Required: random string used to sign JWT sessions. install.sh generates
      # one for you; if you bring your own .env, run: openssl rand -hex 32
      SESSION_SECRET: "${SESSION_SECRET:?SESSION_SECRET must be set in .env (run: openssl rand -hex 32)}"
      # Recommended: AES encryption key for card keys at rest (32 hex chars).
      # Generate: openssl rand -hex 16
      ENCRYPTION_KEY: "${ENCRYPTION_KEY:-}"

      # ── Card shop ─────────────────────────────────────────────────────────
      # Optional: override the bitpos.app fulfillment API URL
      SHOP_API_URL: "${SHOP_API_URL:-https://bitpos.app/api/shop}"
      # Optional: HMAC secret for shop proxy authentication
      SHOP_INSTANCE_SECRET: "${SHOP_INSTANCE_SECRET:-}"

      DATABASE_URL: "postgresql://bitpos:bitpos@db:5432/bitpos"
      NODE_ENV: "production"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bitpos-network

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bitpos
      POSTGRES_USER: bitpos
      POSTGRES_PASSWORD: bitpos
    volumes:
      - bitpos-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bitpos -d bitpos"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bitpos-network

volumes:
  bitpos-db:
    driver: local

networks:
  bitpos-network:
    driver: bridge
